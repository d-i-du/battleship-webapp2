
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Морской бой</title>
  <link rel="stylesheet" href="battleship.css">
</head>
<body>

<h2>🚢 Мини-морской бой</h2>

<div id="status"><h3>Твой ход</h3></div>

<div class="boards">
  <div class="board-container">
      <h4>🎯 Противник</h4>
      <div id="enemyBoard" class="board"></div>
  </div>

  <div class="board-container">
      <h4>🧭 Твоё поле</h4>
      <div id="playerBoard" class="board"></div>
  </div>
</div>

<button class="board-container" onclick="startGame()" style="letter-spacing: 2px;"><h4>🔄 Начать новую игру</h4></button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="battleship.js"></script>

</body>
</html>
